<!doctype html>
<html>
<head><meta charset="utf-8"><style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1024px; height:500px; overflow:hidden; }
  .wrap {
    width:1024px; height:500px; display:flex; align-items:center; justify-content:space-between;
    padding:56px 64px;
    background: linear-gradient(135deg, #0a0a0e 0%, #16161f 100%);
    color:#f2f2f7;
    font-family: system-ui, -apple-system, "Helvetica Neue", Arial, sans-serif;
    position:relative;
  }
  .left { display:flex; flex-direction:column; }
  .brand { display:flex; align-items:center; gap:16px; margin-bottom:28px; }
  .brand img { width:60px; height:60px; border-radius:14px; }
  .brand span { font-size:36px; font-weight:700; letter-spacing:-1px; }
  .eyebrow { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size:16px; letter-spacing:5px; text-transform:uppercase; color:#22c55e; margin-bottom:16px; }
  .head { font-size:58px; font-weight:700; line-height:1.02; letter-spacing:-2px; }
  .head .b { color:#3b82f6; }
  .sub { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size:20px; color:#9a9aa8; margin-top:26px; }
  .vu { display:flex; align-items:flex-end; gap:14px; height:340px; }
  .vu i { width:22px; border-radius:7px; display:block; }
</style></head>
<body>
  <div class="wrap">
    <div class="left">
      <div class="brand">
        <img src="file:///Users/bernardo.nascimento/development/mix/store/play/icon-512.png" alt="">
        <span>EarMix</span>
      </div>
      <div class="eyebrow">Seu retorno, no seu controle</div>
      <div class="head">Seu mix de fone,<br><span class="b">na palma da mão</span></div>
      <div class="sub">Behringer X32 · Midas M32 · pela rede Wi-Fi</div>
    </div>
    <div class="vu">
      <i style="height:210px;background:#22c55e"></i>
      <i style="height:150px;background:#22c55e"></i>
      <i style="height:270px;background:#ffd60a"></i>
      <i style="height:120px;background:#22c55e"></i>
      <i style="height:190px;background:#22c55e"></i>
      <i style="height:300px;background:#ff453a"></i>
      <i style="height:160px;background:#3b82f6"></i>
    </div>
  </div>
</body>
</html>
